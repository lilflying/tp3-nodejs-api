services:
  db:
    image: mysql:8.0
    container_name: tp_db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: company
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_net

  backend:
    build: ./backend
    container_name: tp_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/company?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app_net

  frontend:
    build: ./frontend
    container_name: tp_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - app_net

  prometheus:
    image: prom/prometheus:latest
    container_name: tp_prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend
    networks:
      - app_net

  grafana:
    image: grafana/grafana:latest
    container_name: tp_grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - app_net

volumes:
  db_data:
  grafana_data:

networks:
  app_net:
    driver: bridge
